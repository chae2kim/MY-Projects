<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교육일정 관리</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#F0F4F8;color:#1E293B;font-size:14px}

  /* 레이아웃 */
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:210px;background:#0C447C;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .topbar{background:#fff;border-bottom:1px solid #E2E8F0;padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .content{flex:1;padding:20px 24px;overflow-y:auto}

  /* 사이드바 */
  .sb-logo{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.1)}
  .sb-logo-text{font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.3px}
  .sb-logo-sub{font-size:11px;color:#85B7EB;margin-top:3px}
  .sb-nav{padding:14px 10px;flex:1}
  .sb-section{font-size:10px;color:#85B7EB;padding:10px 8px 4px;letter-spacing:0.5px}
  .sb-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background 0.15s}
  .sb-item:hover{background:rgba(255,255,255,0.08)}
  .sb-item.active{background:#185FA5}
  .sb-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .sb-icon svg{width:16px;height:16px;stroke:#B5D4F4;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .sb-item.active .sb-icon svg{stroke:#fff}
  .sb-label{font-size:13px;color:#B5D4F4}
  .sb-item.active .sb-label{color:#fff;font-weight:500}
  .sb-badge{margin-left:auto;background:#E24B4A;color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
  .sb-bottom{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
  .sb-user{display:flex;align-items:center;gap:8px;padding:8px 10px}
  .sb-avatar{width:30px;height:30px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
  .sb-uname{font-size:12px;color:#B5D4F4}
  .sb-sync{font-size:10px;color:#85B7EB;margin-top:1px}

  /* 탑바 */
  .topbar-title{font-size:16px;font-weight:700;color:#0C447C;flex:1}
  .topbar-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .btn-primary{background:#185FA5;color:#fff;border:none}
  .btn-primary:hover{background:#0C447C}
  .btn-success{background:#fff;color:#3B6D11;border:1px solid #97C459}
  .btn-success:hover{background:#EAF3DE}
  .btn-danger{background:#fff;color:#A32D2D;border:1px solid #F09595}
  .btn-danger:hover{background:#FCEBEB}
  .btn-secondary{background:#fff;color:#64748B;border:1px solid #CBD5E1}
  .btn-secondary:hover{background:#F8FAFC}

  /* 페이지 */
  .page{display:none}
  .page.active{display:block}

  /* 알림 배너 */
  .alert-banner{background:#FEF9EC;border:1px solid #FAC775;border-radius:10px;padding:12px 16px;display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
  .alert-icon{width:20px;height:20px;background:#EF9F27;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
  .alert-title{font-size:13px;font-weight:700;color:#633806;margin-bottom:5px}
  .alert-items{display:flex;flex-direction:column;gap:4px}
  .alert-row{font-size:12px;color:#854F0B;display:flex;align-items:center;gap:8px}

  /* 메트릭 카드 */
  .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
  .mc{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:16px}
  .mc-label{font-size:11px;color:#94A3B8;margin-bottom:6px}
  .mc-val{font-size:22px;font-weight:700;color:#0C447C}
  .mc-sub{font-size:11px;color:#94A3B8;margin-top:3px}

  /* 카드 */
  .card{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:16px;margin-bottom:14px}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card-title{font-size:14px;font-weight:700;color:#0C447C}

  /* 테이블 */
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  table th{text-align:left;color:#94A3B8;font-weight:500;padding:6px 8px;border-bottom:1px solid #E2E8F0;white-space:nowrap}
  table td{padding:8px 8px;border-bottom:1px solid #F1F5F9;color:#1E293B;vertical-align:middle}
  table tr:last-child td{border-bottom:none}
  table tr:hover td{background:#F8FAFC}
  .total-row td{background:#EEF4FF;font-weight:700;color:#0C447C}

  /* 뱃지 */
  .chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
  .chip-red{background:#FCEBEB;color:#A32D2D}
  .chip-orange{background:#FAEEDA;color:#854F0B}
  .chip-green{background:#EAF3DE;color:#3B6D11}
  .chip-blue{background:#E6F1FB;color:#185FA5}
  .chip-gray{background:#F1F5F9;color:#64748B}

  /* 아바타 */
  .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
  .person{display:flex;align-items:center;gap:8px}

  /* 보수교육 현황 */
  .expire-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9}
  .expire-row:last-child{border-bottom:none}
  .ex-name{font-size:13px;font-weight:500;color:#1E293B}
  .ex-edu{font-size:11px;color:#94A3B8;margin-top:2px}
  .ex-right{text-align:right}
  .ex-date{font-size:11px;color:#94A3B8;margin-top:3px}
  .pbar{width:100px;height:5px;background:#E2E8F0;border-radius:3px;margin-top:5px;overflow:hidden;margin-left:auto}
  .pfill{height:100%;border-radius:3px}

  /* 캘린더 */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .cal-nav{display:flex;align-items:center;gap:12px}
  .cal-month{font-size:16px;font-weight:700;color:#0C447C}
  .cal-nav-btn{width:30px;height:30px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748B;font-size:14px}
  .cal-nav-btn:hover{background:#F0F4F8}
  .cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px}
  .cal-day-header{text-align:center;font-size:11px;color:#94A3B8;padding:4px 0;font-weight:500}
  .cal-cell{background:#F8FAFC;border-radius:8px;padding:6px;min-height:80px;border:1px solid #F1F5F9}
  .cal-cell.today{background:#EEF4FF;border:1px solid #85B7EB}
  .cal-cell.other-month{opacity:0.4}
  .cal-date{font-size:11px;color:#94A3B8;margin-bottom:4px}
  .cal-cell.today .cal-date{color:#185FA5;font-weight:700}
  .cal-event{border-radius:4px;padding:2px 5px;font-size:10px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-event-blue{background:#E6F1FB;color:#185FA5}
  .cal-event-red{background:#FCEBEB;color:#A32D2D}
  .cal-event-orange{background:#FAEEDA;color:#854F0B}

  /* 검색 */
  .search-wrap{display:flex;gap:8px;margin-bottom:16px}
  .search-input{flex:1;border:1px solid #CBD5E1;border-radius:8px;padding:8px 14px;font-size:13px;color:#1E293B;background:#fff;outline:none;font-family:inherit}
  .search-input:focus{border-color:#185FA5}

  /* 폼 */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  .form-label{font-size:12px;color:#64748B;font-weight:500}
  .form-input{border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;font-size:13px;color:#1E293B;background:#fff;outline:none;font-family:inherit;transition:border 0.15s}
  .form-input:focus{border-color:#185FA5}
  .form-select{border:1px solid #CBD5E1;border-radius:8px;padding:8px 12px;font-size:13px;color:#1E293B;background:#fff;outline:none;font-family:inherit;cursor:pointer}
  .form-select:focus{border-color:#185FA5}

  /* 실적 필터 */
  .filter-bar{background:#fff;border:1px solid #E2E8F0;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .filter-label{font-size:12px;color:#64748B;white-space:nowrap}
  .ytab-wrap{display:flex;gap:4px}
  .ytab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #CBD5E1;color:#64748B;background:#fff;transition:all 0.15s;font-family:inherit}
  .ytab.on{background:#185FA5;color:#fff;border-color:#185FA5}
  .fdiv{width:1px;height:24px;background:#E2E8F0}
  .fdate{border:1px solid #CBD5E1;border-radius:7px;padding:6px 10px;font-size:12px;color:#1E293B;background:#fff;height:32px;font-family:inherit;outline:none}
  .fsel{border:1px solid #CBD5E1;border-radius:7px;padding:5px 10px;font-size:12px;color:#1E293B;background:#fff;height:32px;font-family:inherit;outline:none;cursor:pointer}

  /* 바 차트 */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar-row:last-child{margin-bottom:0}
  .bar-name{font-size:12px;color:#1E293B;width:55px;flex-shrink:0}
  .bar-wrap{flex:1;height:10px;background:#F0F4F8;border-radius:5px;overflow:hidden}
  .bar-fill{height:100%;border-radius:5px;transition:width 0.5s ease}
  .bar-val{font-size:11px;color:#64748B;width:80px;text-align:right;flex-shrink:0}

  /* 로딩 */
  .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#94A3B8;font-size:13px;gap:8px}
  .spin{width:16px;height:16px;border:2px solid #E2E8F0;border-top-color:#185FA5;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 토스트 */
  .toast{position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}

  /* 모달 */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:none;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:14px;padding:24px;width:520px;max-width:90vw;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:16px;font-weight:700;color:#0C447C;margin-bottom:20px}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid #E2E8F0}

  /* 행 actions */
  .row-actions{display:flex;gap:4px}
  .act-btn{padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #E2E8F0;background:#fff;color:#64748B;font-family:inherit;transition:all 0.15s}
  .act-btn:hover{background:#F0F4F8}
  .act-btn.del:hover{background:#FCEBEB;color:#A32D2D;border-color:#F09595}

  /* 반응형 2열 */
  .row2{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}

  /* 빈 상태 */
  .empty{text-align:center;padding:40px;color:#94A3B8;font-size:13px}

  /* 동기화 상태 */
  .sync-status{font-size:11px;color:#94A3B8;display:flex;align-items:center;gap:4px}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0}
  .sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
  .sync-dot.error{background:#E24B4A}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>

<div class="app">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-text">교육일정 관리</div>
      <div class="sb-logo-sub">Education Manager</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section">메인</div>
      <div class="sb-item active" onclick="showPage('dashboard',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
        <span class="sb-label">대시보드</span>
      </div>
      <div class="sb-item" onclick="showPage('calendar',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg></div>
        <span class="sb-label">캘린더</span>
      </div>
      <div class="sb-section">관리</div>
      <div class="sb-item" onclick="showPage('search',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <span class="sb-label">직원 검색</span>
      </div>
      <div class="sb-item" onclick="showPage('protection',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <span class="sb-label">보수교육 관리</span>
        <span class="sb-badge" id="sb-badge-count">0</span>
      </div>
      <div class="sb-item" onclick="showPage('input',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
        <span class="sb-label">교육 입력</span>
      </div>
      <div class="sb-section">리포트</div>
      <div class="sb-item" onclick="showPage('performance',this)">
        <div class="sb-icon"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
        <span class="sb-label">실적 조회</span>
      </div>
    </div>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar">관리</div>
        <div>
          <div class="sb-uname">관리자</div>
          <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-text">연결됨</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">대시보드</div>
      <div id="topbar-actions"></div>
    </div>

    <div class="content">

      <!-- 대시보드 -->
      <div class="page active" id="page-dashboard">
        <div id="alert-container"></div>
        <div class="metrics" id="dash-metrics">
          <div class="mc"><div class="mc-label">이번 달 교육</div><div class="mc-val" id="m-month">-</div><div class="mc-sub">건</div></div>
          <div class="mc"><div class="mc-label">총 교육비 (이번달)</div><div class="mc-val" id="m-cost" style="font-size:16px">-</div><div class="mc-sub">원</div></div>
          <div class="mc"><div class="mc-label">만료 임박</div><div class="mc-val" id="m-expire" style="color:#A32D2D">-</div><div class="mc-sub">60일 이내</div></div>
          <div class="mc"><div class="mc-label">올해 교육 건수</div><div class="mc-val" id="m-year" style="color:#3B6D11">-</div><div class="mc-sub">건</div></div>
        </div>
        <div class="row2">
          <div class="card">
            <div class="card-head"><div class="card-title">최근 교육 이력</div></div>
            <div class="tbl-wrap"><div id="dash-recent"></div></div>
          </div>
          <div class="card">
            <div class="card-head"><div class="card-title">보수교육 현황</div></div>
            <div id="dash-protection"></div>
          </div>
        </div>
      </div>

      <!-- 캘린더 -->
      <div class="page" id="page-calendar">
        <div class="card">
          <div class="cal-header">
            <div class="cal-nav">
              <button class="cal-nav-btn" onclick="changeMonth(-1)">◀</button>
              <div class="cal-month" id="cal-title"></div>
              <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
            <div style="display:flex;gap:6px;font-size:11px;color:#94A3B8;align-items:center">
              <span style="background:#E6F1FB;color:#185FA5;padding:2px 8px;border-radius:4px">교육일정</span>
              <span style="background:#FCEBEB;color:#A32D2D;padding:2px 8px;border-radius:4px">만료일</span>
            </div>
          </div>
          <div class="cal-grid" id="cal-headers"></div>
          <div style="height:8px"></div>
          <div class="cal-grid" id="cal-body"></div>
        </div>
      </div>

      <!-- 직원 검색 -->
      <div class="page" id="page-search">
        <div class="search-wrap">
          <input class="search-input" id="search-input" placeholder="직원 이름을 입력하세요..." oninput="searchEmployee(this.value)">
        </div>
        <div id="search-result"></div>
      </div>

      <!-- 보수교육 관리 -->
      <div class="page" id="page-protection">
        <div class="card">
          <div class="card-head">
            <div class="card-title">보수교육 대상자 현황</div>
            <button class="topbar-btn btn-primary" onclick="openAddProtectionModal()">+ 대상자 추가</button>
          </div>
          <div id="protection-list" style="max-height:400px;overflow-y:auto"></div>
        </div>
      </div>

      <!-- 교육 입력 -->
      <div class="page" id="page-input">
        <div class="row2">
          <div class="card">
            <div class="card-head"><div class="card-title">교육 이력 추가</div></div>
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label">직원 선택</label>
                <select class="form-select" id="input-emp">
                  <option value="">직원 선택...</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">교육명</label>
                <input class="form-input" id="input-name" placeholder="예: ISO 9001 구축 및 운영실무">
              </div>
              <div class="form-group">
                <label class="form-label">교육 날짜</label>
                <input class="form-input" id="input-date" type="date">
              </div>
              <div class="form-group">
                <label class="form-label">장소</label>
                <input class="form-input" id="input-place" placeholder="예: 한국표준협회">
              </div>
              <div class="form-group">
                <label class="form-label">금액 (원)</label>
                <input class="form-input" id="input-cost" type="number" placeholder="80000">
              </div>
              <div class="form-group">
                <label class="form-label">유효기간</label>
                <select class="form-select" id="input-validity">
                  <option value="">없음</option>
                  <option value="1">1년</option>
                  <option value="2">2년</option>
                  <option value="3">3년</option>
                  <option value="5">5년</option>
                </select>
              </div>
              <div class="form-group full">
                <label class="form-label">비고</label>
                <input class="form-input" id="input-note" placeholder="메모 (선택)">
              </div>
              <div class="form-group full">

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyLrHSe9NtrgTfL5kRKVKPFAMToW2m39O4I3wM4DbZwlRVd5gypn42UmKQdfRZlGH-_qg/exec';

let state = { 교육이력: [], 직원목록: [], 보수교육대상: [] };
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let perfData = [];

const COLORS = ['#185FA5','#378ADD','#85B7EB','#B5D4F4','#E6F1FB'];
const AV_COLORS = [
  {bg:'#E6F1FB',c:'#185FA5'},{bg:'#EAF3DE',c:'#3B6D11'},{bg:'#FAEEDA',c:'#854F0B'},
  {bg:'#EEEDFE',c:'#534AB7'},{bg:'#E1F5EE',c:'#0F6E56'},{bg:'#FAECE7',c:'#993C1D'}
];

// ─── API ───────────────────────────────────────────────
async function apiCall(params) {
  setSyncStatus('syncing');
  try {
    const url = API_URL + '?' + new URLSearchParams(params);
    const res = await fetch(url);
    const data = await res.json();
    setSyncStatus('ok');
    return data;
  } catch(e) {
    setSyncStatus('error');
    throw e;
  }
}

async function loadAll() {
  try {
    const data = await apiCall({action:'getAll'});
    state = data;
    refreshAll();
  } catch(e) {
    showToast('데이터 로드 실패. 연결을 확인해주세요.');
  }
}

// ─── 상태 ───────────────────────────────────────────────
function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if(s==='ok'){dot.className='sync-dot';txt.textContent='연결됨'}
  else if(s==='syncing'){dot.className='sync-dot syncing';txt.textContent='동기화 중'}
  else{dot.className='sync-dot error';txt.textContent='오류'}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ─── 네비게이션 ──────────────────────────────────────────
const pageTitles = {
  dashboard:'대시보드', calendar:'캘린더', search:'직원 검색',
  protection:'보수교육 관리', input:'교육 입력', performance:'실적 조회'
};

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  el.classList.add('active');
  document.getElementById('page-title').textContent = pageTitles[id];
  if(id==='calendar') renderCalendar();
  if(id==='performance') initPerformance();
}

// ─── 전체 새로고침 ────────────────────────────────────────
function refreshAll() {
  renderDashboard();
  renderEmpList();
  renderEmpSelect();
  renderProtectionList();
  updateBadge();
}

// ─── 유틸 ────────────────────────────────────────────────
function getAvColor(name) {
  let h = 0;
  for(let c of name) h = (h*31 + c.charCodeAt(0)) % AV_COLORS.length;
  return AV_COLORS[h];
}

function avEl(name) {
  const c = getAvColor(name);
  return `<div class="av" style="background:${c.bg};color:${c.c}">${name.length>=3?name.slice(1,3):name}</div>`;
}

function formatCost(n) {
  return parseInt(n||0).toLocaleString();
}

function calcExpireDate(dateStr, years) {
  if(!dateStr||!years) return '';
  const d = new Date(dateStr);
  d.setFullYear(d.getFullYear() + parseInt(years));
  return d.toISOString().slice(0,10);
}

function daysLeft(expireStr) {
  if(!expireStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(expireStr);
  return Math.round((exp - today) / 86400000);
}

function dChip(days) {
  if(days === null) return '';
  if(days < 0) return '<span class="chip chip-gray">만료됨</span>';
  if(days <= 7) return `<span class="chip chip-red">D-${days}</span>`;
  if(days <= 30) return `<span class="chip chip-orange">D-${days}</span>`;
  if(days <= 60) return `<span class="chip chip-orange">D-${days}</span>`;
  return `<span class="chip chip-green">D-${days}</span>`;
}

function fmtDate(s) {
  if(!s) return '';
  return String(s).replace(/-/g,'.').slice(0,10);
}

// ─── 대시보드 ─────────────────────────────────────────────
function renderDashboard() {
  const now = new Date();
  const thisYear = now.getFullYear();
  const thisMonth = now.getMonth();

  const monthData = state.교육이력.filter(r => {
    if(!r.날짜) return false;
    const d = new Date(r.날짜);
    return d.getFullYear()===thisYear && d.getMonth()===thisMonth;
  });
  const yearData = state.교육이력.filter(r => {
    if(!r.날짜) return false;
    return new Date(r.날짜).getFullYear()===thisYear;
  });

  document.getElementById('m-month').textContent = monthData.length;
  document.getElementById('m-cost').textContent = formatCost(monthData.reduce((s,r)=>s+Number(r.금액||0),0));
  document.getElementById('m-year').textContent = yearData.length;

  // 만료 임박
  const expiring = state.보수교육대상.filter(r => {
    const d = daysLeft(r.만료일);
    return d !== null && d >= 0 && d <= 60;
  });
  document.getElementById('m-expire').textContent = expiring.length;

  // 알림 배너
  const alertEl = document.getElementById('alert-container');
  const urgent = state.보수교육대상.filter(r => {
    const d = daysLeft(r.만료일);
    return d !== null && d >= 0 && d <= 60;
  }).sort((a,b) => daysLeft(a.만료일) - daysLeft(b.만료일));

  if(urgent.length > 0) {
    alertEl.innerHTML = `<div class="alert-banner">
      <div class="alert-icon">!</div>
      <div>
        <div class="alert-title">만료 임박 보수교육 ${urgent.length}건이 있습니다</div>
        <div class="alert-items">${urgent.map(r => {
          const d = daysLeft(r.만료일);
          return `<div class="alert-row">${dChip(d)} ${r.이름} · ${r.교육명} · ${fmtDate(r.만료일)} 만료</div>`;
        }).join('')}</div>
      </div>
    </div>`;
  } else {
    alertEl.innerHTML = '';
  }

  // 최근 이력
  const recent = [...state.교육이력].sort((a,b)=>new Date(b.날짜)-new Date(a.날짜)).slice(0,5);
  if(recent.length===0) {
    document.getElementById('dash-recent').innerHTML = '<div class="empty">교육 이력이 없습니다</div>';
  } else {
    document.getElementById('dash-recent').innerHTML = `
      <table>
        <thead><tr><th>이름</th><th>부서</th><th>교육명</th><th>날짜</th><th>금액</th></tr></thead>
        <tbody>${recent.map(r=>`
          <tr>
            <td><div class="person">${avEl(r.이름||'?')}<span>${r.이름||''}</span></div></td>
            <td style="color:#94A3B8">${r.부서||''}</td>
            <td>${r.교육명||''}</td>
            <td style="color:#94A3B8">${fmtDate(r.날짜)}</td>
            <td>${formatCost(r.금액)}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  // 보수교육 현황
  const sorted = [...state.보수교육대상].sort((a,b)=>daysLeft(a.만료일)-daysLeft(b.만료일));
  if(sorted.length===0) {
    document.getElementById('dash-protection').innerHTML = '<div class="empty">등록된 대상자가 없습니다</div>';
  } else {
    document.getElementById('dash-protection').innerHTML = sorted.map(r => {
      const d = daysLeft(r.만료일);
      const pct = d === null ? 0 : Math.max(0, Math.min(100, Math.round((1 - d/730)*100)));
      const barColor = d <= 7 ? '#E24B4A' : d <= 30 ? '#EF9F27' : d <= 60 ? '#EF9F27' : '#639922';
      return `<div class="expire-row">
        <div><div class="ex-name">${r.이름}</div><div class="ex-edu">${r.교육명}</div></div>
        <div class="ex-right">
          ${dChip(d)}
          <div class="ex-date">~ ${fmtDate(r.만료일)} 만료</div>
          <div class="pbar"><div class="pfill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>
      </div>`;
    }).join('');
  }
}

// ─── 배지 업데이트 ────────────────────────────────────────
function updateBadge() {
  const cnt = state.보수교육대상.filter(r => {
    const d = daysLeft(r.만료일);
    return d !== null && d >= 0 && d <= 60;
  }).length;
  const b = document.getElementById('sb-badge-count');
  b.textContent = cnt;
  b.style.display = cnt > 0 ? '' : 'none';
}

// ─── 캘린더 ──────────────────────────────────────────────
function changeMonth(d) { calMonth += d; if(calMonth>11){calMonth=0;calYear++} if(calMonth<0){calMonth=11;calYear--} renderCalendar(); }

function renderCalendar() {
  const DAYS = ['일','월','화','수','목','금','토'];
  document.getElementById('cal-title').textContent = `${calYear}년 ${calMonth+1}월`;
  document.getElementById('cal-headers').innerHTML = DAYS.map(d=>`<div class="cal-day-header">${d}</div>`).join('');

  const first = new Date(calYear, calMonth, 1).getDay();
  const last = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  let cells = [];
  for(let i=0;i<first;i++) {
    const d = new Date(calYear, calMonth, -first+i+1);
    cells.push({date:d, other:true});
  }
  for(let i=1;i<=last;i++) cells.push({date:new Date(calYear,calMonth,i), other:false});
  while(cells.length%7!==0) { const d=new Date(calYear,calMonth+1,cells.length-first-last+1); cells.push({date:d,other:true}); }

  document.getElementById('cal-body').innerHTML = cells.map(({date,other})=>{
    const ds = date.toISOString().slice(0,10);
    const isToday = date.getTime()===today.getTime();
    const edus = state.교육이력.filter(r=>String(r.날짜).slice(0,10)===ds);
    const exps = state.보수교육대상.filter(r=>String(r.만료일).slice(0,10)===ds);
    return `<div class="cal-cell${isToday?' today':''}${other?' other-month':''}">
      <div class="cal-date">${date.getDate()}</div>
      ${edus.map(r=>`<div class="cal-event cal-event-blue" title="${r.이름} - ${r.교육명}">${r.이름} ${r.교육명}</div>`).join('')}
      ${exps.map(r=>`<div class="cal-event cal-event-red" title="${r.이름} 만료">⚠ ${r.이름} 만료</div>`).join('')}
    </div>`;
  }).join('');
}

// ─── 직원 검색 ────────────────────────────────────────────
function searchEmployee(q) {
  const el = document.getElementById('search-result');
  if(!q.trim()) { el.innerHTML = ''; return; }
  const found = state.직원목록.filter(e => e.이름 && e.이름.includes(q.trim()));
  if(found.length===0) { el.innerHTML = '<div class="empty">검색 결과가 없습니다</div>'; return; }

  el.innerHTML = found.map(emp => {
    const history = state.교육이력.filter(r=>r.이름===emp.이름).sort((a,b)=>new Date(b.날짜)-new Date(a.날짜));
    const prot = state.보수교육대상.filter(r=>r.이름===emp.이름);
    const c = getAvColor(emp.이름);
    return `<div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #E2E8F0">
        <div style="width:44px;height:44px;border-radius:50%;background:${c.bg};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:${c.c}">${emp.이름.slice(0,2)}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:#0C447C">${emp.이름}</div>
          <div style="font-size:12px;color:#94A3B8">${emp.부서||''} · 총 교육 ${history.length}건</div>
        </div>
        ${prot.length>0?`<div style="margin-left:auto">${prot.map(r=>dChip(daysLeft(r.만료일))).join(' ')}</div>`:''}
      </div>
      ${history.length>0?`
      <table>
        <thead><tr><th>교육명</th><th>날짜</th><th>장소</th><th>금액</th><th>만료일</th></tr></thead>
        <tbody>${history.map(r=>`
          <tr>
            <td>${r.교육명||''}</td>
            <td style="color:#94A3B8">${fmtDate(r.날짜)}</td>
            <td style="color:#94A3B8">${r.장소||''}</td>
            <td>${formatCost(r.금액)}</td>
            <td>${r.만료일?fmtDate(r.만료일):'<span style="color:#94A3B8">-</span>'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`:'<div class="empty">교육 이력이 없습니다</div>'}
    </div>`;
  }).join('');
}

// ─── 보수교육 관리 ────────────────────────────────────────
function renderProtectionList() {
  const el = document.getElementById('protection-list');
  const sorted = [...state.보수교육대상].sort((a,b)=>daysLeft(a.만료일)-daysLeft(b.만료일));
  if(sorted.length===0) { el.innerHTML = '<div class="empty">등록된 대상자가 없습니다</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>이름</th><th>부서</th><th>교육명</th><th>최근 이수일</th><th>만료일</th><th>상태</th><th>진행</th><th></th></tr></thead>
    <tbody>${sorted.map((r,i)=>{
      const d = daysLeft(r.만료일);
      const pct = d===null?0:Math.max(0,Math.min(100,Math.round((1-d/730)*100)));
      const barColor = d<=7?'#E24B4A':d<=30?'#EF9F27':d<=60?'#EF9F27':'#639922';
      return `<tr>
        <td><div class="person">${avEl(r.이름||'?')}<span>${r.이름||''}</span></div></td>
        <td style="color:#94A3B8">${r.부서||''}</td>
        <td>${r.교육명||''}</td>
        <td style="color:#94A3B8">${fmtDate(r.최근이수일)}</td>
        <td>${fmtDate(r.만료일)}</td>
        <td>${dChip(d)}</td>
        <td><div style="width:80px;height:6px;background:#F0F4F8;border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${barColor};border-radius:3px"></div></div></td>
        <td><div class="row-actions">
          <button class="act-btn del" onclick="deleteProtection(${i+2})">삭제</button>
        </div></td>
      </tr>`;
    }).join('')}
    </tbody>
  </table>`;
}

// ─── 직원 목록 ────────────────────────────────────────────
function renderEmpList() {
  const el = document.getElementById('emp-list');
  if(state.직원목록.length===0) { el.innerHTML = '<div class="empty">등록된 직원이 없습니다</div>'; return; }
  const sorted = [...state.직원목록].sort((a,b)=>(a.이름||'').localeCompare(b.이름||'','ko'));
  el.innerHTML = `<table>
    <thead><tr><th>이름</th><th>부서</th><th></th></tr></thead>
    <tbody>${sorted.map((e,i)=>`
      <tr>
        <td><div class="person">${avEl(e.이름||'?')}<span>${e.이름||''}</span></div></td>
        <td style="color:#94A3B8">${e.부서||''}</td>
        <td><button class="act-btn del" onclick="deleteEmployee(${state.직원목록.indexOf(e)+2})">삭제</button></td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderEmpSelect() {
  const sel = document.getElementById('input-emp');
  const protSel = document.getElementById('prot-emp');
  const sorted = [...state.직원목록].sort((a,b)=>(a.이름||'').localeCompare(b.이름||'','ko'));
  const opts = sorted.map(e=>`<option value="${e.이름}">${e.이름} (${e.부서||''})</option>`).join('');
  sel.innerHTML = '<option value="">직원 선택...</option>' + opts;
  protSel.innerHTML = '<option value="">선택...</option>' + opts;
}

// ─── 저장 ────────────────────────────────────────────────
async function saveEducation() {
  const empName = document.getElementById('input-emp').value;
  const name = document.getElementById('input-name').value.trim();
  const date = document.getElementById('input-date').value;
  const place = document.getElementById('input-place').value.trim();
  const cost = document.getElementById('input-cost').value;
  const validity = document.getElementById('input-validity').value;
  const note = document.getElementById('input-note').value.trim();

  if(!empName||!name||!date) { showToast('직원, 교육명, 날짜는 필수입니다'); return; }

  const emp = state.직원목록.find(e=>e.이름===empName);
  const expireDate = validity ? calcExpireDate(date, validity) : '';
  const id = Date.now();

  const row = [id, empName, emp?.부서||'', name, date, place, cost||0, validity||'', expireDate, note];
  try {
    await apiCall({action:'add', sheet:'교육이력', data:JSON.stringify(row)});
    state.교육이력.push({ID:id, 이름:empName, 부서:emp?.부서||'', 교육명:name, 날짜:date, 장소:place, 금액:cost||0, 유효기간:validity||'', 만료일:expireDate, 비고:note});
    refreshAll();
    document.getElementById('input-name').value='';
    document.getElementById('input-date').value='';
    document.getElementById('input-place').value='';
    document.getElementById('input-cost').value='';
    document.getElementById('input-validity').value='';
    document.getElementById('input-note').value='';
    showToast('교육 이력이 저장되었습니다');
  } catch(e) { showToast('저장 실패. 다시 시도해주세요'); }
}

async function saveEmployee() {
  const name = document.getElementById('emp-name').value.trim();
  const dept = document.getElementById('emp-dept').value.trim();
  if(!name) { showToast('이름을 입력해주세요'); return; }
  const id = Date.now();
  const row = [id, name, dept];
  try {
    await apiCall({action:'add', sheet:'직원목록', data:JSON.stringify(row)});
    state.직원목록.push({ID:id, 이름:name, 부서:dept});
    refreshAll();
    closeModal('modal-emp');
    document.getElementById('emp-name').value='';
    document.getElementById('emp-dept').value='';
    showToast('직원이 추가되었습니다');
  } catch(e) { showToast('저장 실패'); }
}

async function saveProtection() {
  const empName = document.getElementById('prot-emp').value;
  const eduName = document.getElementById('prot-name').value.trim();
  const date = document.getElementById('prot-date').value;
  const validity = document.getElementById('prot-validity').value;
  if(!empName||!eduName||!date) { showToast('모든 항목을 입력해주세요'); return; }
  const emp = state.직원목록.find(e=>e.이름===empName);
  const expireDate = calcExpireDate(date, validity);
  const id = Date.now();
  const row = [id, empName, emp?.부서||'', eduName, date, expireDate];
  try {
    await apiCall({action:'add', sheet:'보수교육대상', data:JSON.stringify(row)});
    state.보수교육대상.push({ID:id, 이름:empName, 부서:emp?.부서||'', 교육명:eduName, 최근이수일:date, 만료일:expireDate});
    refreshAll();
    closeModal('modal-protection');
    showToast('보수교육 대상자가 추가되었습니다');
  } catch(e) { showToast('저장 실패'); }
}

// ─── 삭제 ────────────────────────────────────────────────
async function deleteEmployee(row) {
  if(!confirm('직원을 삭제하시겠습니까?')) return;
  try {
    await apiCall({action:'delete', sheet:'직원목록', row});
    await loadAll();
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패'); }
}

async function deleteProtection(row) {
  if(!confirm('보수교육 대상자를 삭제하시겠습니까?')) return;
  try {
    await apiCall({action:'delete', sheet:'보수교육대상', row});
    await loadAll();
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패'); }
}

// ─── 모달 ────────────────────────────────────────────────
function openAddEmpModal() { document.getElementById('modal-emp').classList.add('show'); }
function openAddProtectionModal() { renderEmpSelect(); document.getElementById('modal-protection').classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ─── 실적 조회 ────────────────────────────────────────────
function initPerformance() {
  const now = new Date();
  const thisYear = now.getFullYear();

  // 연도 탭
  const years = [];
  for(let y=thisYear-2; y<=thisYear; y++) years.push(y);
  document.getElementById('year-tabs').innerHTML = years.map(y=>
    `<button class="ytab${y===thisYear?' on':''}" onclick="selectYear(${y},this)">${y}</button>`
  ).join('');

  document.getElementById('perf-from').value = `${thisYear}-01-01`;
  document.getElementById('perf-to').value = `${thisYear}-12-31`;

  // 부서/직원 필터
  const depts = [...new Set(state.직원목록.map(e=>e.부서).filter(Boolean))];
  document.getElementById('perf-dept').innerHTML = '<option value="">전체</option>' + depts.map(d=>`<option>${d}</option>`).join('');
  document.getElementById('perf-emp').innerHTML = '<option value="">전체</option>' + state.직원목록.map(e=>`<option>${e.이름}</option>`).join('');

  loadPerformance();
}

function selectYear(y, el) {
  document.querySelectorAll('.ytab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('perf-from').value = `${y}-01-01`;
  document.getElementById('perf-to').value = `${y}-12-31`;
  loadPerformance();
}

function loadPerformance() {
  const from = document.getElementById('perf-from').value;
  const to = document.getElementById('perf-to').value;
  const dept = document.getElementById('perf-dept').value;
  const emp = document.getElementById('perf-emp').value;

  perfData = state.교육이력.filter(r => {
    if(!r.날짜) return false;
    if(from && r.날짜 < from) return false;
    if(to && r.날짜 > to) return false;
    if(dept && r.부서 !== dept) return false;
    if(emp && r.이름 !== emp) return false;
    return true;
  }).sort((a,b)=>new Date(b.날짜)-new Date(a.날짜));

  const totalCost = perfData.reduce((s,r)=>s+Number(r.금액||0),0);
  const people = new Set(perfData.map(r=>r.이름)).size;
  const avg = people > 0 ? Math.round(totalCost/people) : 0;

  document.getElementById('pm-count').textContent = perfData.length + '건';
  document.getElementById('pm-cost').textContent = totalCost.toLocaleString() + '원';
  document.getElementById('pm-people').textContent = people + '명';
  document.getElementById('pm-avg').textContent = avg.toLocaleString() + '원';

  // 부서별 차트
  const deptMap = {};
  perfData.forEach(r => { deptMap[r.부서||'미정'] = (deptMap[r.부서||'미정']||0) + Number(r.금액||0); });
  const maxDept = Math.max(...Object.values(deptMap), 1);
  document.getElementById('perf-dept-chart').innerHTML = Object.entries(deptMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([d,v],i)=>`<div class="bar-row">
      <div class="bar-name">${d}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxDept*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
      <div class="bar-val">${v.toLocaleString()}원</div>
    </div>`).join('') || '<div class="empty">데이터 없음</div>';

  // 직원별 차트
  const empMap = {};
  perfData.forEach(r => { empMap[r.이름||'미정'] = (empMap[r.이름||'미정']||0) + 1; });
  const maxEmp = Math.max(...Object.values(empMap), 1);
  document.getElementById('perf-emp-chart').innerHTML = Object.entries(empMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([n,v],i)=>`<div class="bar-row">
      <div class="bar-name">${n}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(v/maxEmp*100)}%;background:${COLORS[i%COLORS.length]}"></div></div>
      <div class="bar-val" style="width:40px">${v}건</div>
    </div>`).join('') || '<div class="empty">데이터 없음</div>';

  // 테이블
  if(perfData.length===0) {
    document.getElementById('perf-table').innerHTML = '<div class="empty">조회된 데이터가 없습니다</div>';
    return;
  }
  const totalCostAll = perfData.reduce((s,r)=>s+Number(r.금액||0),0);
  document.getElementById('perf-table').innerHTML = `<table>
    <thead><tr><th>이름</th><th>부서</th><th>교육명</th><th>날짜</th><th>장소</th><th>금액</th><th>유효기간</th><th>만료일</th></tr></thead>
    <tbody>
      ${perfData.map(r=>`<tr>
        <td><div class="person">${avEl(r.이름||'?')}<span>${r.이름||''}</span></div></td>
        <td style="color:#94A3B8">${r.부서||''}</td>
        <td>${r.교육명||''}</td>
        <td style="color:#94A3B8">${fmtDate(r.날짜)}</td>
        <td style="color:#94A3B8">${r.장소||''}</td>
        <td>${formatCost(r.금액)}</td>
        <td style="color:#94A3B8">${r.유효기간?r.유효기간+'년':'-'}</td>
        <td style="color:#94A3B8">${r.만료일?fmtDate(r.만료일):'-'}</td>
      </tr>`).join('')}
      <tr class="total-row">
        <td colspan="5" style="text-align:right;padding-right:12px">합계</td>
        <td>${totalCostAll.toLocaleString()}</td>
        <td colspan="2"></td>
      </tr>
    </tbody>
  </table>`;
}

// ─── 엑셀 내보내기 ────────────────────────────────────────
function exportExcel() {
  if(perfData.length===0) { showToast('조회된 데이터가 없습니다'); return; }
  const headers = ['이름','부서','교육명','날짜','장소','금액','유효기간','만료일'];
  const rows = perfData.map(r=>[r.이름,r.부서,r.교육명,r.날짜,r.장소,r.금액,r.유효기간?r.유효기간+'년':'',r.만료일||'']);
  const totalCost = perfData.reduce((s,r)=>s+Number(r.금액||0),0);
  rows.push(['','','','','합계',totalCost,'','']);

  const csv = [headers, ...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const from = document.getElementById('perf-from').value;
  const to = document.getElementById('perf-to').value;
  a.download = `교육실적_${from}_${to}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('엑셀 파일이 다운로드되었습니다');
}
